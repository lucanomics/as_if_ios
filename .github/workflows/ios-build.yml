name: iOS Build

# Remote build verification for the "As if" SwiftUI app.
# This only verifies that the native iOS app compiles on a macOS runner.
# It does not run tests (there are no test targets) and does not verify
# runtime behavior such as microphone permission or recording UX.

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save runner minutes.
concurrency:
  group: ios-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build AsIf (iOS Simulator)
    runs-on: macos-15

    env:
      PROJECT: AsIf.xcodeproj
      SCHEME: AsIf

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show available Xcode versions
        run: |
          echo "Installed Xcode apps:"
          ls /Applications | grep -i "Xcode" || true
          echo
          echo "Current Xcode:"
          xcodebuild -version

      - name: Select Xcode 16 (if needed)
        run: |
          set -euo pipefail
          current="$(xcodebuild -version | head -1 | awk '{print $2}')"
          echo "Current Xcode version: $current"
          case "$current" in
            16.*)
              echo "Already on Xcode 16 — keeping it."
              ;;
            *)
              # Pick the highest installed Xcode 16.x app.
              app="$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1 || true)"
              if [ -n "$app" ]; then
                echo "Selecting $app"
                sudo xcode-select -s "$app/Contents/Developer"
                xcodebuild -version
              else
                echo "No Xcode 16 install found; continuing with $current."
              fi
              ;;
          esac

      - name: List schemes
        run: xcodebuild -list -project "$PROJECT"

      - name: Resolve a simulator destination
        run: |
          set -euo pipefail
          # Prefer the requested iPhone 16; fall back to any available iPhone,
          # then to a generic simulator destination so the build never breaks
          # just because a specific device name is missing on the runner image.
          available="$(xcrun simctl list devices available)"
          echo "$available"

          if echo "$available" | grep -q "iPhone 16 "; then
            DEST="platform=iOS Simulator,name=iPhone 16,OS=latest"
          else
            name="$(echo "$available" | grep -Eo 'iPhone [0-9]+( Pro( Max)?| Plus)?' | head -1 || true)"
            if [ -n "$name" ]; then
              DEST="platform=iOS Simulator,name=$name,OS=latest"
            else
              DEST="generic/platform=iOS Simulator"
            fi
          fi

          echo "Using destination: $DEST"
          echo "DEST=$DEST" >> "$GITHUB_ENV"

      - name: Build
        run: |
          set -euo pipefail
          xcodebuild build \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration Debug \
            -destination "$DEST" \
            CODE_SIGNING_ALLOWED=NO
